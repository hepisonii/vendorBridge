<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VendoBridge — Vendor Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --panel: #13161d; --panel-deep: #0f111a;
      --border: #1f2330; --accent: #c8a96e;
      --accent-glow: rgba(200,169,110,0.15); --accent-soft: rgba(200,169,110,0.07);
      --text: #e8e6e0; --muted: #6b6f7c; --muted-light: #9a9eaa;
      --input-bg: #191c25; --input-border: #252837; --input-focus: #c8a96e;
      --error: #e07070; --success: #6ec8a0;
    }
    body {
      min-height: 100vh; background: var(--bg);
      font-family: 'DM Sans', sans-serif; color: var(--text);
      padding: 48px 16px 80px; position: relative; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; top: -200px; left: 50%;
      transform: translateX(-50%); width: 700px; height: 500px;
      background: radial-gradient(ellipse, rgba(200,169,110,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: ''; position: fixed; bottom: -150px; right: -100px;
      width: 450px; height: 450px;
      background: radial-gradient(ellipse, rgba(100,120,200,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    /* NAV */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      max-width: 860px; margin: 0 auto 48px;
    }
    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .brand-icon {
      width: 34px; height: 34px; background: var(--accent); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .brand-icon svg { width: 16px; height: 16px; fill: #0d0f14; }
    .brand-name { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--accent); letter-spacing: 0.03em; }
    .nav-btn {
      padding: 8px 18px; border-radius: 10px; font-size: 0.82rem;
      font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer;
      transition: all 0.2s; text-decoration: none; letter-spacing: 0.02em;
      background: none; border: 1px solid var(--border); color: var(--muted);
    }
    .nav-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* LAYOUT */
    .page-wrap {
      max-width: 860px; margin: 0 auto;
      display: grid; grid-template-columns: 260px 1fr; gap: 24px; align-items: start;
    }

    /* SIDEBAR */
    .sidebar-card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 20px;
      overflow: hidden; position: sticky; top: 32px; animation: fadeUp 0.5s ease both;
    }
    .sidebar-body { padding: 24px; }

    .profile-name { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .profile-sub  { font-size: 0.8rem; color: var(--muted); margin-bottom: 18px; }

    .meta-list { display: flex; flex-direction: column; gap: 12px; }
    .meta-item { display: flex; align-items: center; gap: 10px; font-size: 0.82rem; color: var(--muted-light); }
    .meta-item svg { width: 15px; height: 15px; color: var(--muted); flex-shrink: 0; }

    .status-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 500;
      margin-top: 18px;
    }
    .status-pill.active  { background: rgba(110,200,160,0.1); color: #6ec8a0; border: 1px solid rgba(110,200,160,0.2); }
    .status-pill.pending { background: rgba(200,169,110,0.1); color: var(--accent); border: 1px solid rgba(200,169,110,0.2); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    /* MAIN CARD */
    .main-card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 20px;
      overflow: hidden; animation: fadeUp 0.5s 0.1s ease both;
    }
    .main-card::before {
      content: ''; display: block; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }
    .card-header {
      padding: 28px 32px 22px; border-bottom: 1px solid var(--border);
    }
    .card-header-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 600; color: var(--text); }
    .card-header-sub   { font-size: 0.78rem; color: var(--muted); margin-top: 4px; font-weight: 300; }

    .method-badge {
      display: inline-flex; align-items: center; gap: 6px; margin-top: 10px;
      padding: 5px 12px; border-radius: 8px; font-size: 0.72rem; font-weight: 600;
      font-family: 'DM Sans', sans-serif; letter-spacing: 0.06em;
    }
    .method-badge.patch { background: rgba(110,168,200,0.1); color: #6ea8c8; border: 1px solid rgba(110,168,200,0.2); }
    .method-badge.post  { background: rgba(200,169,110,0.1); color: var(--accent); border: 1px solid rgba(200,169,110,0.2); }

    .card-body { padding: 28px 32px 32px; }

    /* FLASH */
    .flash-msg {
      margin-bottom: 20px; padding: 12px 16px; border-radius: 10px;
      font-size: 0.85rem; display: none;
    }
    .flash-msg.success { background: rgba(110,200,160,0.1); border: 1px solid rgba(110,200,160,0.2); color: var(--success); display: block; }
    .flash-msg.error   { background: rgba(224,112,112,0.08); border: 1px solid rgba(224,112,112,0.2); color: var(--error); display: block; }

    /* LOADING */
    .loading-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 60px 32px; gap: 16px;
    }
    .spinner {
      width: 36px; height: 36px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-text { font-size: 0.85rem; color: var(--muted); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* FORM */
    .form-section-title {
      font-size: 0.68rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px;
    }
    .fields-grid { display: grid; gap: 16px; margin-bottom: 22px; }
    .fields-grid.cols-2 { grid-template-columns: 1fr 1fr; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    label.field-label {
      font-size: 0.7rem; font-weight: 500; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    input, select {
      background: var(--input-bg); border: 1px solid var(--input-border);
      border-radius: 10px; padding: 12px 14px; font-size: 0.9rem;
      font-family: 'DM Sans', sans-serif; color: var(--text); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s; width: 100%;
    }
    input::placeholder { color: #3a3e4d; }
    input:focus, select:focus {
      border-color: var(--input-focus); background: #1c1f2a;
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    select option { background: var(--input-bg); color: var(--text); }
    .field-hint { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

    .section-divider { height: 1px; background: var(--border); margin: 24px 0; }
    .save-row { display: flex; justify-content: flex-end; }
    .btn-save {
      padding: 12px 32px; background: var(--accent); color: #0d0f14; border: none;
      border-radius: 11px; font-size: 0.85rem; font-family: 'DM Sans', sans-serif;
      font-weight: 600; cursor: pointer; letter-spacing: 0.04em;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative; overflow: hidden;
    }
    .btn-save::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent); }
    .btn-save:hover { opacity: 0.9; box-shadow: 0 4px 20px rgba(200,169,110,0.3); }
    .btn-save:active { transform: scale(0.985); }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 700px) {
      .page-wrap { grid-template-columns: 1fr; }
      .sidebar-card { position: static; }
      .fields-grid.cols-2 { grid-template-columns: 1fr; }
      .card-header { padding: 20px 20px 16px; }
      .card-body { padding: 20px 20px 24px; }
    }
  </style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <a href="/" class="brand">
    <div class="brand-icon">
      <!-- Original logo from your code -->
      <svg viewBox="0 0 24 24"><path d="M12 2L3 7v10l9 5 9-5V7L12 2zm0 2.18L19 8.5v7L12 19.5 5 15.5v-7l7-4.32z"/></svg>
    </div>
    <span class="brand-name">VendoBridge</span>
  </a>
  <a href="/dashboard" class="nav-btn">Dashboard</a>
</nav>

<div class="page-wrap">

  <!-- SIDEBAR -->
  <aside class="sidebar-card">
    <div class="sidebar-body">
      <p class="profile-name" id="sidebarName">Your Business</p>
      <p class="profile-sub"  id="sidebarCategory">No category set</p>

      <div class="meta-list">
        <div class="meta-item">
          <svg fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <span id="sidebarEmail">—</span>
        </div>
        <div class="meta-item">
          <svg fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.68A2 2 0 012 .18h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.91a16 16 0 006.07 6.07l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
          </svg>
          <span id="sidebarPhone">—</span>
        </div>
        <div class="meta-item">
          <svg fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
            <path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/>
          </svg>
          <span id="sidebarGST">—</span>
        </div>
      </div>

      <div class="status-pill pending" id="statusPill">
        <span class="status-dot"></span>
        <span id="statusText">Not Registered</span>
      </div>
    </div>
  </aside>

  <!-- MAIN CARD -->
  <main class="main-card">
    <div class="card-header">
      <p class="card-header-title" id="cardTitle">Vendor Profile</p>
      <p class="card-header-sub"   id="cardSub">Loading your vendor information…</p>
      <div class="method-badge" id="methodBadge" style="display:none"></div>
    </div>

    <div class="card-body">
      <!-- Loading -->
      <div class="loading-state" id="loadingState">
        <div class="spinner"></div>
        <p class="loading-text">Fetching vendor data…</p>
      </div>

      <!-- Form -->
      <div id="formWrapper" style="display:none">
        <div id="jsFlash" class="flash-msg"></div>

        <form id="vendorForm" novalidate>
          <p class="form-section-title">Business Details</p>
          <div class="fields-grid cols-2">

            <div class="field">
              <label class="field-label" for="name">Business / Vendor Name</label>
              <input type="text" id="name" name="name" placeholder="e.g. Sharma Traders" required />
            </div>

            <div class="field">
              <label class="field-label" for="email">Email Address</label>
              <input type="email" id="email" name="email" placeholder="vendor@example.com" required />
            </div>

            <div class="field">
              <label class="field-label" for="gstNumber">GST Number</label>
              <input type="text" id="gstNumber" name="gstNumber" placeholder="22AAAAA0000A1Z5" maxlength="15" />
              <span class="field-hint">15-digit GSTIN (optional)</span>
            </div>

            <div class="field">
              <label class="field-label" for="contactNumber">Contact Number</label>
              <input type="tel" id="contactNumber" name="contactNumber" placeholder="+91 98765 43210" required />
            </div>

            <div class="field" style="grid-column: 1 / -1;">
              <label class="field-label" for="category">Vendor Category</label>
              <select id="category" name="category" required>
                <option value="" disabled selected>Select your business category</option>
                <option value="Food & Beverages">🍽️ Food & Beverages</option>
                <option value="Electronics & Technology">💻 Electronics & Technology</option>
                <option value="Clothing & Apparel">👗 Clothing & Apparel</option>
                <option value="Health & Pharmaceuticals">💊 Health & Pharmaceuticals</option>
                <option value="Construction & Real Estate">🏗️ Construction & Real Estate</option>
                <option value="Agriculture & Farm Produce">🌾 Agriculture & Farm Produce</option>
                <option value="Logistics & Transportation">🚚 Logistics & Transportation</option>
                <option value="Retail & General Trade">🛒 Retail & General Trade</option>
                <option value="Beauty & Personal Care">💄 Beauty & Personal Care</option>
                <option value="Education & Training">📚 Education & Training</option>
              </select>
            </div>

          </div>

          <div class="section-divider"></div>
          <div class="save-row">
            <button type="submit" class="btn-save" id="saveBtn">Register as Vendor</button>
          </div>
        </form>
      </div>
    </div>
  </main>

</div>

<script>
  let isExistingVendor = false;

  async function loadVendor() {
  try {
    const res = await fetch('/api/vendor/me', {
      credentials: "include"
    });

    if (!res.ok) throw new Error("Failed");

    const data = await res.json();
    const vendor = data.vendor;

    isExistingVendor = !!vendor;

    setupUI(vendor || {});

  } catch (e) {
    console.error(e);
    isExistingVendor = false;
    setupUI({});
  }
}

  function setupUI(data) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('formWrapper').style.display  = 'block';

    const methodBadge = document.getElementById('methodBadge');
    methodBadge.style.display = 'inline-flex';

    if (isExistingVendor) {
      // PATCH mode — vendor already exists
      document.getElementById('cardTitle').textContent  = 'Update Vendor Profile';
      document.getElementById('cardSub').textContent    = 'Update your registered vendor details below';
      document.getElementById('saveBtn').textContent    = 'Save Changes';
      methodBadge.textContent = 'PATCH · Updating existing record';
      methodBadge.className   = 'method-badge patch';
      document.getElementById('statusPill').className   = 'status-pill active';
      document.getElementById('statusText').textContent = 'Registered Vendor';

      // Pre-fill existing values
      if (data.name)          { document.getElementById('name').value          = data.name;          updateSidebar('name', data.name); }
      if (data.email)         { document.getElementById('email').value         = data.email;         updateSidebar('email', data.email); }
      if (data.gstNumber)     { document.getElementById('gstNumber').value     = data.gstnumber;     updateSidebar('gst', data.gstNumber); }
      if (data.contactNumber) { document.getElementById('contactNumber').value = data.contactnumber; updateSidebar('phone', data.contactNumber); }
      if (data.category)      { document.getElementById('category').value      = data.category;      updateSidebar('category', data.category); }
    } else {
      // POST mode — new vendor
      document.getElementById('cardTitle').textContent = 'Register as Vendor';
      document.getElementById('cardSub').textContent   = 'Fill in your details to register as a vendor on VendoBridge';
      document.getElementById('saveBtn').textContent   = 'Register as Vendor';
      methodBadge.textContent = 'POST · Creating new vendor record';
      methodBadge.className   = 'method-badge post';
    }
  }

  function updateSidebar(field, value) {
    if (field === 'name')     document.getElementById('sidebarName').textContent     = value;
    if (field === 'email')    document.getElementById('sidebarEmail').textContent    = value;
    if (field === 'phone')    document.getElementById('sidebarPhone').textContent    = value;
    if (field === 'gst')      document.getElementById('sidebarGST').textContent      = value;
    if (field === 'category') document.getElementById('sidebarCategory').textContent = value;
  }

  // Live sidebar preview as user types
  document.getElementById('name').addEventListener('input', e => {
    document.getElementById('sidebarName').textContent = e.target.value.trim() || 'Your Business';
  });
  document.getElementById('email').addEventListener('input', e => {
    document.getElementById('sidebarEmail').textContent = e.target.value.trim() || '—';
  });
  document.getElementById('contactNumber').addEventListener('input', e => {
    document.getElementById('sidebarPhone').textContent = e.target.value.trim() || '—';
  });
  document.getElementById('gstNumber').addEventListener('input', e => {
    document.getElementById('sidebarGST').textContent = e.target.value.trim() || '—';
  });
  document.getElementById('category').addEventListener('change', e => {
    document.getElementById('sidebarCategory').textContent = e.target.value || 'No category set';
  });

  document.getElementById('vendorForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const flash   = document.getElementById('jsFlash');
    const saveBtn = document.getElementById('saveBtn');
    flash.className    = 'flash-msg';
    flash.style.display = 'none';

    const body = {
      name:          document.getElementById('name').value.trim(),
      email:         document.getElementById('email').value.trim(),
      gstNumber:     document.getElementById('gstNumber').value.trim(),
      contactNumber: document.getElementById('contactNumber').value.trim(),
      category:      document.getElementById('category').value,
    };

    if (!body.name || !body.email || !body.contactNumber || !body.category) {
      flash.className    = 'flash-msg error';
      flash.textContent  = 'Please fill in all required fields.';
      flash.style.display = 'block';
      return;
    }

    saveBtn.disabled    = true;
    saveBtn.textContent = isExistingVendor ? 'Saving…' : 'Registering…';

    try {
      // KEY LOGIC: PATCH if vendor=true, POST if vendor=false
      const method   = isExistingVendor ? 'PATCH' : 'POST';
      const endpoint = '/vendor/profile';

      const res = await fetch(endpoint, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      if (res.ok) {
        flash.className    = 'flash-msg success';
        flash.textContent  = isExistingVendor
          ? 'Vendor profile updated successfully!'
          : 'Successfully registered as a vendor on VendoBridge!';
        flash.style.display = 'block';

        if (!isExistingVendor) {
          // Flip to PATCH mode after first successful POST
          isExistingVendor = true;
          document.getElementById('statusPill').className    = 'status-pill active';
          document.getElementById('statusText').textContent  = 'Registered Vendor';
          document.getElementById('saveBtn').textContent     = 'Save Changes';
          document.getElementById('methodBadge').textContent = 'PATCH · Updating existing record';
          document.getElementById('methodBadge').className   = 'method-badge patch';
          document.getElementById('cardTitle').textContent   = 'Update Vendor Profile';
          document.getElementById('cardSub').textContent     = 'Update your registered vendor details below';
        }
      } else {
        const data = await res.json().catch(() => ({}));
        flash.className    = 'flash-msg error';
        flash.textContent  = data.message || 'Something went wrong. Please try again.';
        flash.style.display = 'block';
      }
    } catch (err) {
      flash.className    = 'flash-msg error';
      flash.textContent  = 'Network error. Please try again.';
      flash.style.display = 'block';
    } finally {
      saveBtn.disabled    = false;
      saveBtn.textContent = isExistingVendor ? 'Save Changes' : 'Register as Vendor';
      flash.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  });

  loadVendor();
</script>
</body>
</html>
