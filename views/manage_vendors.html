<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VendoBridge — Manage Vendors</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --panel: #13161d;
      --border: #1f2330;
      --accent: #c8a96e;
      --accent-glow: rgba(200,169,110,0.13);
      --text: #e8e6e0;
      --muted: #6b6f7c;
      --input-bg: #191c25;
      --input-border: #252837;
      --sidebar-w: 240px;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      display: flex;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -180px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(200,169,110,0.06) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 50;
    }

    .sb-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 22px 20px 20px;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
    }
    .sb-brand-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sb-brand-icon svg { width: 15px; height: 15px; fill: #0d0f14; }
    .sb-brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      color: var(--accent);
      letter-spacing: 0.03em;
    }
    .sb-badge {
      margin-left: auto;
      font-size: 0.6rem;
      font-weight: 500;
      background: rgba(200,169,110,0.18);
      color: var(--accent);
      border: 1px solid rgba(200,169,110,0.3);
      border-radius: 4px;
      padding: 2px 6px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .sb-nav {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0 12px;
    }
    .sb-nav::-webkit-scrollbar { width: 0; }

    .sb-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 20px;
      cursor: pointer;
      text-decoration: none;
      color: var(--muted);
      font-size: 0.875rem;
      font-weight: 400;
      transition: color 0.18s, background 0.18s;
      border-left: 2px solid transparent;
      margin: 1px 0;
    }
    .sb-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .sb-item.active {
      color: var(--accent);
      background: var(--accent-glow);
      border-left-color: var(--accent);
      font-weight: 500;
    }
    .sb-icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .sb-icon svg { width: 17px; height: 17px; }

    .sb-user { padding: 14px 20px; border-top: 1px solid var(--border); }
    .sb-user-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
    .sb-user-name { font-size: 0.85rem; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sb-user-role { font-size: 0.7rem; color: var(--accent); margin-top: 2px; }

    /* ── TOPBAR ── */
    .topbar {
      position: fixed;
      top: 0; left: var(--sidebar-w); right: 0;
      height: 60px;
      background: rgba(13,15,20,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 28px;
      z-index: 40;
    }
    .topbar-title { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 600; color: var(--text); }

    /* ── MAIN ── */
    .main {
      margin-left: var(--sidebar-w);
      margin-top: 60px;
      flex: 1;
      overflow-y: auto;
      min-height: calc(100vh - 60px);
      position: relative;
      z-index: 1;
      padding: 28px;
    }

    /* ── FILTER TABS ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .filter-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: 0.03em;
    }
    .filter-btn:hover { color: var(--text); border-color: var(--muted); }
    .filter-btn.active { color: var(--text); border-color: var(--accent); background: var(--accent-glow); }

    .filter-btn .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-APPROVED { background: #3db782; }
    .dot-PENDING  { background: #c8a96e; }
    .dot-BLOCKED  { background: #e05c5c; }
    .dot-REJECTED { background: #a0536a; }
    .dot-all      { background: var(--muted); }

    .filter-btn .count {
      font-size: 0.7rem;
      background: rgba(255,255,255,0.07);
      border-radius: 4px;
      padding: 1px 6px;
      color: var(--muted);
    }
    .filter-btn.active .count { color: var(--accent); background: rgba(200,169,110,0.12); }

    /* ── VENDOR GRID ── */
    .vendor-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .vendor-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: border-color 0.2s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }
    .vendor-card:hover { border-color: rgba(200,169,110,0.3); transform: translateY(-2px); }

    .vendor-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .vendor-card.status-APPROVED::before { background: #3db782; }
    .vendor-card.status-PENDING::before  { background: #c8a96e; }
    .vendor-card.status-BLOCKED::before  { background: #e05c5c; }
    .vendor-card.status-REJECTED::before { background: #a0536a; }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .vendor-avatar {
      width: 42px; height: 42px;
      border-radius: 10px;
      background: rgba(200,169,110,0.12);
      border: 1px solid rgba(200,169,110,0.2);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
      flex-shrink: 0;
    }

    .status-pill {
      font-size: 0.65rem;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.07em;
    }
    .pill-APPROVED { background: rgba(61,183,130,0.15);  color: #3db782; }
    .pill-PENDING  { background: rgba(200,169,110,0.15); color: #c8a96e; }
    .pill-BLOCKED  { background: rgba(220,80,80,0.15);   color: #e05c5c; }
    .pill-REJECTED { background: rgba(160,83,106,0.15);  color: #c47090; }

    .vendor-name {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }

    .vendor-category {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .card-details {
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding: 14px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 14px;
    }

    .detail-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
    }
    .detail-row .detail-label { color: var(--muted); min-width: 80px; }
    .detail-row .detail-value { color: var(--text); font-weight: 400; }

    .card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .action-btn {
      flex: 1;
      padding: 7px 12px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.16s;
      color: var(--muted);
      white-space: nowrap;
    }
    .action-btn:hover { color: var(--text); border-color: var(--muted); }
    .action-btn.approve { color: #3db782; border-color: rgba(61,183,130,0.3); }
    .action-btn.approve:hover { background: rgba(61,183,130,0.1); border-color: #3db782; }
    .action-btn.reject  { color: #c47090; border-color: rgba(160,83,106,0.3); }
    .action-btn.reject:hover  { background: rgba(160,83,106,0.1); border-color: #c47090; }
    .action-btn.block   { color: #e05c5c; border-color: rgba(220,80,80,0.3); }
    .action-btn.block:hover   { background: rgba(220,80,80,0.1); border-color: #e05c5c; }

    /* empty state */
    .empty-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 0.875rem;
    }

    @media (max-width: 640px) {
      .sidebar { display: none; }
      .topbar, .main { left: 0; margin-left: 0; }
    }
  </style>
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar">
  <a class="sb-brand" href="#">
    <div class="sb-brand-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L3 7v10l9 5 9-5V7L12 2zm0 2.18L19 8.5v7L12 19.5 5 15.5v-7l7-4.32z"/></svg>
    </div>

  <nav class="sb-nav">

    <a class="sb-item active" href="/admin/vendors">
      <span class="sb-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>

      </span>

    </a>

    <a class="sb-item" href="/admin/managers">
      <span class="sb-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0112 0v2"/>
          <path d="M19 8l2 2-6 6h-2v-2l6-6z"/>
        </svg>
      </span>
      Manage Managers
    </a>

    <a class="sb-item" href="/admin/analytics">
      <span class="sb-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
      </span>
      Procurement Analytics
    </a>
  </nav>

  <div class="sb-user">
    <div class="sb-user-label">Logged in as</div>
    <div class="sb-user-name" id="sb-fullname">Loading...</div>
    <div class="sb-user-role">System Administrator</div>
  </div>
</aside>

<!-- ── TOPBAR ── -->
<header class="topbar">
  <span class="topbar-title">Manage Vendors</span>
</header>

<!-- ── MAIN ── -->
<main class="main">

  <!-- Filter Tabs -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">
      <span class="dot dot-all"></span>
      All
      <span class="count" id="count-all">5</span>
    </button>
    <button class="filter-btn" data-filter="APPROVED">
      <span class="dot dot-APPROVED"></span>
      Approved
      <span class="count" id="count-APPROVED">0</span>
    </button>
    <button class="filter-btn" data-filter="PENDING">
      <span class="dot dot-PENDING"></span>
      Pending
      <span class="count" id="count-PENDING">0</span>
    </button>
    <button class="filter-btn" data-filter="BLOCKED">
      <span class="dot dot-BLOCKED"></span>
      Blocked
      <span class="count" id="count-BLOCKED">0</span>
    </button>
    <button class="filter-btn" data-filter="REJECTED">
      <span class="dot dot-REJECTED"></span>
      Rejected
      <span class="count" id="count-REJECTED">0</span>
    </button>
  </div>

  <!-- Vendor Cards Grid -->
  <div class="vendor-grid" id="vendor-grid"></div>

</main>

<script>
  // ── ACTIVE NAV ──
  document.querySelectorAll('.sb-item').forEach(item => {
    item.addEventListener('click', function() {
      document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('active'));
      this.classList.add('active');
    });
  });

  // ── FETCH ADMIN USER ──
  async function loadUser() {
    try {
      const res = await fetch('/api/admin/me');
      const data = await res.json();
      document.getElementById('sb-fullname').textContent = data.fullname || data.username || 'Admin';
    } catch (err) {
      document.getElementById('sb-fullname').textContent = 'Admin';
    }
  }

  // ────────────────────────────────────────────────
  // DUMMY DATA — comment this out when switching to API
  // ────────────────────────────────────────────────
  const DUMMY_VENDORS = [
    {
      _id: '6a23c29dfb0e3e00759a5371',
      name: 'Tostilas',
      email: 'hepisonii@gmail.com',
      gstNumber: 'GST29AB12345',
      contactNumber: '+91 98765 43210',
      category: 'Electronics & Technology',
      status: 'PENDING'
    },
    {
      _id: '6a23c29dfb0e3e00759a5372',
      name: 'BuildRight Co.',
      email: 'contact@buildright.in',
      gstNumber: 'GST07CD67890',
      contactNumber: '+91 91234 56789',
      category: 'Construction & Infrastructure',
      status: 'APPROVED'
    },
    {
      _id: '6a23c29dfb0e3e00759a5373',
      name: 'MediSupply Ltd.',
      email: 'info@medisupply.com',
      gstNumber: 'GST19EF11223',
      contactNumber: '+91 87654 32109',
      category: 'Healthcare & Pharmaceuticals',
      status: 'REJECTED'
    },
    {
      _id: '6a23c29dfb0e3e00759a5374',
      name: 'GreenLeaf Traders',
      email: 'greenleaf@traders.io',
      gstNumber: 'GST33GH44556',
      contactNumber: '+91 99887 76655',
      category: 'Agriculture & Food',
      status: 'BLOCKED'
    },
    {
      _id: '6a23c29dfb0e3e00759a5375',
      name: 'SwiftLogix',
      email: 'ops@swiftlogix.net',
      gstNumber: 'GST22IJ77889',
      contactNumber: '+91 70123 45678',
      category: 'Logistics & Transportation',
      status: 'APPROVED'
    }
  ];
  // ────────────────────────────────────────────────
  // END DUMMY DATA
  // ────────────────────────────────────────────────

  // ────────────────────────────────────────────────
  // API FETCH — uncomment below and delete DUMMY_VENDORS above to use real API
  // API: GET /api/vendor?status=all  → returns { vendor: [...] }
  // API: GET /api/vendor?status=PENDING → returns { vendor: [...] } (for filtered fetch)
  // ────────────────────────────────────────────────
  // async function fetchVendors(status = 'all') {
  //   const res = await fetch(`/api/vendor?status=${status}`);
  //   const data = await res.json();
  //   return data.vendor; // array of vendor objects
  // }
  // ────────────────────────────────────────────────
  // END API FETCH
  // ────────────────────────────────────────────────

  let allVendors = [];
  let activeFilter = 'all';

  function getInitials(name) {
    return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function updateCounts(vendors) {
    document.getElementById('count-all').textContent = vendors.length;
    ['APPROVED', 'PENDING', 'BLOCKED', 'REJECTED'].forEach(s => {
      document.getElementById('count-' + s).textContent = vendors.filter(v => v.status === s).length;
    });
  }

  function renderCards(vendors) {
    const grid = document.getElementById('vendor-grid');
    const filtered = activeFilter === 'all' ? vendors : vendors.filter(v => v.status === activeFilter);

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty-msg">No vendors found for this filter.</div>';
      return;
    }

    grid.innerHTML = filtered.map(v => `
      <div class="vendor-card status-${v.status}">
        <div class="card-header">
          <span class="status-pill pill-${v.status}">${v.status}</span>
        </div>
        <div class="vendor-name">${v.name}</div>
        <div class="vendor-category">${v.category}</div>
        <div class="card-details">
          <div class="detail-row">
            <span class="detail-label">Email</span>
            <span class="detail-value">${v.email}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">GST No.</span>
            <span class="detail-value">${v.gstNumber || '—'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Contact</span>
            <span class="detail-value">${v.contactNumber || '—'}</span>
          </div>
        </div>
        <div class="card-actions">
          ${v.status !== 'APPROVED' ? `<button class="action-btn approve" onclick="updateStatus('${v._id}', 'approve')">Approve</button>` : ''}
          ${v.status !== 'REJECTED' ? `<button class="action-btn reject"  onclick="updateStatus('${v._id}', 'reject')">Reject</button>`   : ''}
          ${v.status !== 'BLOCKED'  ? `<button class="action-btn block"   onclick="updateStatus('${v._id}', 'block')">Block</button>`     : ''}
        </div>

      </div>
    `).join('');
  }

  // ────────────────────────────────────────────────
  // UPDATE STATUS — uses dummy data locally for now
  // To connect to API replace the body with:
  // await fetch(`/api/vendor/${vendorId}/status`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: newStatus }) });
  // ────────────────────────────────────────────────
  async function updateStatus(vendorId, action) {
    // action is: 'approve', 'reject', or 'block'
    // API: PATCH /admin/vendors/:id/approve
    // API: PATCH /admin/vendors/:id/reject
    // API: PATCH /admin/vendors/:id/block
    try {
      const res = await fetch(`/admin/vendors/${vendorId}/${action}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' }
      });
      if (!res.ok) throw new Error('Request failed');
      await loadVendors(); // refresh cards after update
    } catch (err) {
      console.error('Failed to update vendor status:', err);
    }
  }

  // ── FILTER BUTTONS ──
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      activeFilter = this.dataset.filter;
      renderCards(allVendors);
    });
  });

  // ── LOAD VENDORS ──
  async function loadVendors() {
    // DUMMY: comment out below line and uncomment API fetch when ready
    allVendors = DUMMY_VENDORS;

    // API fetch — uncomment below and remove DUMMY line above when ready:
    // allVendors = await fetchVendors('all');

    updateCounts(allVendors);
    renderCards(allVendors);
  }

  loadUser();
  loadVendors();
</script>

</body>
</html>
