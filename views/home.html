<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skill Swap — Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --panel: #13161d;
      --border: #1f2330;
      --accent: #c8a96e;
      --accent-glow: rgba(200,169,110,0.13);
      --text: #e8e6e0;
      --muted: #6b6f7c;
      --input-bg: #191c25;
      --input-border: #252837;
      --sidebar-w: 240px;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      display: flex;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -180px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(200,169,110,0.06) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 50;
    }

    .sb-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 22px 20px 20px;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
    }
    .sb-brand-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sb-brand-icon svg { width: 15px; height: 15px; fill: #0d0f14; }
    .sb-brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      color: var(--accent);
      letter-spacing: 0.03em;
    }

    .sb-nav {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0 12px;
    }
    .sb-nav::-webkit-scrollbar { width: 0; }

    .sb-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 20px;
      cursor: pointer;
      text-decoration: none;
      color: var(--muted);
      font-size: 0.875rem;
      font-weight: 400;
      transition: color 0.18s, background 0.18s;
      border-left: 2px solid transparent;
      margin: 1px 0;
    }
    .sb-item:hover {
      color: var(--text);
      background: rgba(255,255,255,0.03);
    }
    .sb-item.active {
      color: var(--accent);
      background: var(--accent-glow);
      border-left-color: var(--accent);
      font-weight: 500;
    }
    .sb-icon {
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sb-icon svg { width: 17px; height: 17px; }

    /* user at bottom */
    .sb-user {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sb-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: #0d0f14;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .sb-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .sb-avatar::after {
      content: '';
      position: absolute;
      bottom: 1px; right: 1px;
      width: 8px; height: 8px;
      background: #3ecf6e;
      border-radius: 50%;
      border: 2px solid var(--panel);
    }
    .sb-user-name {
      font-size: 0.83rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: fixed;
      top: 0;
      left: var(--sidebar-w);
      right: 0;
      height: 60px;
      background: rgba(13,15,20,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      z-index: 40;
    }
    .topbar-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
    }
    .inbox-btn {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px 0 10px;
      height: 38px;
      border-radius: 10px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.83rem;
      font-weight: 400;
    }
    .inbox-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-glow);
    }
    .inbox-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
    .inbox-btn-label { line-height: 1; }
    .inbox-dot {
      position: absolute;
      top: 8px; left: 22px;
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      border: 1.5px solid var(--input-bg);
    }

    /* ── MAIN ── */
    .main {
      margin-left: var(--sidebar-w);
      margin-top: 60px;
      flex: 1;
      overflow-y: auto;
      min-height: calc(100vh - 60px);
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .empty-state p {
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 300;
    }

    /* inbox panel */
    .inbox-panel {
      position: fixed;
      top: 60px; right: -340px;
      width: 320px;
      bottom: 0;
      background: var(--panel);
      border-left: 1px solid var(--border);
      z-index: 200;
      transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
      display: flex;
      flex-direction: column;
    }
    .inbox-panel.open { right: 0; }
    .inbox-panel-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .inbox-panel-header h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }
    .close-btn {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--muted);
      transition: color 0.2s, border-color 0.2s;
    }
    .close-btn:hover { color: var(--text); border-color: var(--muted); }
    .close-btn svg { width: 13px; height: 13px; }
    .inbox-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.83rem;
      color: var(--muted);
      font-weight: 300;
    }
    .inbox-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 190;
    }
    .inbox-overlay.show { display: block; }
  </style>
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar">

  <a class="sb-brand" href="#">
    <div class="sb-brand-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L3 7v10l9 5 9-5V7L12 2zm0 2.18L19 8.5v7L12 19.5 5 15.5v-7l7-4.32z"/></svg>
    </div>
    <span class="sb-brand-name">Skill Swap</span>
  </a>

  <nav class="sb-nav">

    <a class="sb-item active" href="/sessions/upcoming">
      <span class="sb-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </span>
      Upcoming Sessions
    </a>

    <a class="sb-item" href="/activity">
      <span class="sb-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/>
        </svg>
      </span>
      Requests / Activity
    </a>

    <a class="sb-item" href="/mentors">
      <span class="sb-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      Browse / Recommended
    </a>

    <a class="sb-item" href="/user/profile">
      <span class="sb-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </span>
      Profile
    </a>

    <!-- Portfolio — hidden by default, shown only when role = mentor -->
    <a class="sb-item" href="/mentor/profile" id="sb-portfolio" style="display:none;">
      <span class="sb-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/>
        </svg>
      </span>
      Portfolio
    </a>

    <a class="sb-item" href="/payments">
      <span class="sb-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 100 7h5a3.5 3.5 0 110 7H6"/>
        </svg>
      </span>
      Payments / Stats
    </a>

  </nav>

  <!-- user at bottom — name + photo pulled from API -->
  <div class="sb-user">
    <div class="sb-avatar" id="sb-avatar-wrap"></div>
    <div class="sb-user-name" id="sb-username">Loading...</div>
  </div>

</aside>

<!-- ── TOPBAR ── -->
<header class="topbar">
  <span class="topbar-title">Home</span>
  <button class="inbox-btn" onclick="toggleInbox()" aria-label="Open inbox">
    <div class="inbox-dot"></div>
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
      <polyline points="22,6 12,13 2,6"/>
    </svg>
    <span class="inbox-btn-label">Inbox</span>
  </button>
</header>

<!-- ── MAIN (empty — add your content here) ── -->
<main class="main">
  <div class="empty-state">
    <p>Your page content goes here.</p>
  </div>
</main>

<!-- ── INBOX PANEL ── -->
<div class="inbox-overlay" id="inboxOverlay" onclick="toggleInbox()"></div>
<div class="inbox-panel" id="inboxPanel">
  <div class="inbox-panel-header">
    <h3>Inbox</h3>
    <button class="close-btn" onclick="toggleInbox()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="inbox-empty">No messages yet.</div>
</div>

<script>
  // ── INBOX TOGGLE ──
  function toggleInbox() {
    document.getElementById('inboxPanel').classList.toggle('open');
    document.getElementById('inboxOverlay').classList.toggle('show');
  }

  // ── ACTIVE NAV ──
  document.querySelectorAll('.sb-item').forEach(item => {
    item.addEventListener('click', function() {
      document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('active'));
      this.classList.add('active');
    });
  });

  // ── FETCH USER FROM API ──
  // Replace '/api/user/me' with your actual route.
  // Expected response shape:
  // {
  //   username: "aryan_shah",    ← displayed as the name
  //   photo_url: "/uploads/...", ← profile photo (optional)
  //   role: "mentor"             ← "mentor" shows Portfolio link, anything else hides it
  // }
  async function loadUser() {
    try {
      const res = await fetch('/api/user');   // ← replace with your route
      const user = await res.json();

      const avatarWrap = document.getElementById('sb-avatar-wrap');
      const usernameEl = document.getElementById('sb-username');

      // Set username
      usernameEl.textContent = user.username || user.fullname || 'User';

      // Set photo or fall back to first initial
      if (user.profileImageURL) {
        const img = document.createElement('img');
        img.src = user.profileImageURL;               // ← your API should return this field
        img.alt = user.username || 'User';
        avatarWrap.appendChild(img);
      } else {
        const name = user.username || user.fullname || '?';
        avatarWrap.textContent = name.charAt(0).toUpperCase();
      }

      // Show Portfolio link only if role is mentor
      if (user.role === 'mentor') {
        document.getElementById('sb-portfolio').style.display = 'flex';
      }

    } catch (err) {
      // Fallback if API fails or user is not logged in
      document.getElementById('sb-username').textContent = 'Guest';
      document.getElementById('sb-avatar-wrap').textContent = 'G';
    }
  }

  loadUser();
</script>

</body>
</html>
