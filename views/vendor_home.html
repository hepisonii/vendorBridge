<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VendoBridge — Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --panel: #13161d;
      --border: #1f2330;
      --accent: #c8a96e;
      --accent-glow: rgba(200,169,110,0.13);
      --text: #e8e6e0;
      --muted: #6b6f7c;
      --input-bg: #191c25;
      --input-border: #252837;
      --sidebar-w: 240px;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      display: flex;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -180px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(200,169,110,0.06) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 50;
    }

    .sb-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 22px 20px 20px;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
    }
    .sb-brand-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sb-brand-icon svg { width: 15px; height: 15px; fill: #0d0f14; }
    .sb-brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      color: var(--accent);
      letter-spacing: 0.03em;
    }

    .sb-nav {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0 12px;
    }
    .sb-nav::-webkit-scrollbar { width: 0; }

    .sb-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 20px;
      cursor: pointer;
      text-decoration: none;
      color: var(--muted);
      font-size: 0.875rem;
      font-weight: 400;
      transition: color 0.18s, background 0.18s;
      border-left: 2px solid transparent;
      margin: 1px 0;
    }
    .sb-item:hover {
      color: var(--text);
      background: rgba(255,255,255,0.03);
    }
    .sb-item.active {
      color: var(--accent);
      background: var(--accent-glow);
      border-left-color: var(--accent);
      font-weight: 500;
    }
    .sb-icon {
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sb-icon svg { width: 17px; height: 17px; }

    /* user at bottom */
    .sb-user {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
    }
    .sb-user-label {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }
    .sb-user-name {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: fixed;
      top: 0;
      left: var(--sidebar-w);
      right: 0;
      height: 60px;
      background: rgba(13,15,20,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 28px;
      z-index: 40;
    }
    .topbar-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
    }

    /* ── MAIN ── */
    .main {
      margin-left: var(--sidebar-w);
      margin-top: 60px;
      flex: 1;
      overflow-y: auto;
      min-height: calc(100vh - 60px);
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .empty-state p {
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 300;
    }

    @media (max-width: 640px) {
      .sidebar { display: none; }
      .topbar, .main { left: 0; margin-left: 0; }
    }
  </style>
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar">

  <a class="sb-brand" href="#">
    <div class="sb-brand-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L3 7v10l9 5 9-5V7L12 2zm0 2.18L19 8.5v7L12 19.5 5 15.5v-7l7-4.32z"/></svg>
    </div>
    <span class="sb-brand-name">VendoBridge</span>
  </a>

  <nav class="sb-nav">

    <a class="sb-item active" href="#">
      <span class="sb-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </span>
      Dashboard
    </a>

    <a class="sb-item" href="#">
      <span class="sb-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/>
        </svg>
      </span>
      RFQ Invitations
    </a>

    <a class="sb-item" href="#">
      <span class="sb-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
      </span>
      Submit Quotations
    </a>

    <a class="sb-item" href="#">
      <span class="sb-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>
        </svg>
      </span>
      My Purchase Orders
    </a>

    <a class="sb-item" href="#">
      <span class="sb-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
        </svg>
      </span>
      My Invoices
    </a>

    <a class="sb-item" href="#">
      <span class="sb-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
          <path d="M18 2l4 4-7 7h-4v-4z"/>
        </svg>
      </span>
      Edit Profile
    </a>

  </nav>

  <!-- user at bottom -->
  <div class="sb-user">
    <div class="sb-user-info">
      <div class="sb-user-label">Logged in as</div>
      <div class="sb-user-name" id="sb-fullname">Loading...</div>
    </div>
  </div>

</aside>

<!-- ── TOPBAR ── -->
<header class="topbar">
  <span class="topbar-title">Home</span>
</header>

<!-- ── MAIN ── -->
<main class="main">
  <div class="empty-state">
    <p>Your page content goes here.</p>
  </div>
</main>

<script>
  // ── ACTIVE NAV ──
  document.querySelectorAll('.sb-item').forEach(item => {
    item.addEventListener('click', function() {
      document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('active'));
      this.classList.add('active');
    });
  });

  // ── FETCH USER FULL NAME ──
  async function loadUser() {
    try {
      const res = await fetch('/api/user');  // ← replace with your actual route
      const user = await res.json();
      document.getElementById('sb-fullname').textContent = user.fullname || user.username || 'User';
    } catch (err) {
      document.getElementById('sb-fullname').textContent = 'Guest';
    }
  }

  loadUser();
</script>

</body>
</html>
