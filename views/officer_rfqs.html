<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VendoBridge — Create RFQs</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --panel: #13161d;
      --border: #1f2330;
      --accent: #c8a96e;
      --accent-glow: rgba(200,169,110,0.13);
      --text: #e8e6e0;
      --muted: #6b6f7c;
      --input-bg: #191c25;
      --input-border: #252837;
      --sidebar-w: 240px;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      display: flex;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -180px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(200,169,110,0.06) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 50;
    }

    .sb-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 22px 20px 20px;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
    }
    .sb-brand-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sb-brand-icon svg { width: 15px; height: 15px; fill: #0d0f14; }
    .sb-brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      color: var(--accent);
      letter-spacing: 0.03em;
    }

    .sb-nav { flex: 1; overflow-y: auto; padding: 10px 0 12px; }
    .sb-nav::-webkit-scrollbar { width: 0; }

    .sb-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 20px;
      cursor: pointer;
      text-decoration: none;
      color: var(--muted);
      font-size: 0.875rem;
      font-weight: 400;
      transition: color 0.18s, background 0.18s;
      border-left: 2px solid transparent;
      margin: 1px 0;
    }
    .sb-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .sb-item.active {
      color: var(--accent);
      background: var(--accent-glow);
      border-left-color: var(--accent);
      font-weight: 500;
    }
    .sb-icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .sb-icon svg { width: 17px; height: 17px; }

    .sb-user { padding: 14px 20px; border-top: 1px solid var(--border); }
    .sb-user-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
    .sb-user-name { font-size: 0.85rem; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── TOPBAR ── */
    .topbar {
      position: fixed;
      top: 0; left: var(--sidebar-w); right: 0;
      height: 60px;
      background: rgba(13,15,20,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 28px;
      z-index: 40;
    }
    .topbar-title { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 600; color: var(--text); }

    /* ── MAIN ── */
    .main {
      margin-left: var(--sidebar-w);
      margin-top: 60px;
      flex: 1;
      overflow-y: auto;
      min-height: calc(100vh - 60px);
      position: relative;
      z-index: 1;
      padding: 28px;
    }

    /* ── CREATE RFQ FORM ── */
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 16px;
    }

    .rfq-form {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px;
      margin-bottom: 32px;
    }

    .rfq-id-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding: 10px 14px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 8px;
    }
    .rfq-id-label {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .rfq-id-value {
      font-size: 0.82rem;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.03em;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .form-group.full { grid-column: 1 / -1; }

    .form-label {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .form-input {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.18s;
      width: 100%;
    }
    .form-input:focus { border-color: rgba(200,169,110,0.4); }
    .form-input::placeholder { color: var(--muted); }

    textarea.form-input {
      resize: vertical;
      min-height: 90px;
    }

    .form-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 6px;
    }

    .error-msg {
      font-size: 0.78rem;
      color: #e05c5c;
      min-height: 18px;
    }

    .submit-btn {
      padding: 10px 26px;
      background: var(--accent);
      color: #0d0f14;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.18s;
      letter-spacing: 0.02em;
    }
    .submit-btn:hover { opacity: 0.88; }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── RFQ LIST ── */
    .rfq-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .rfq-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      border-top: 2px solid var(--accent);
      transition: border-color 0.2s, transform 0.2s;
    }
    .rfq-card:hover { transform: translateY(-2px); border-color: rgba(200,169,110,0.4); }

    .rfq-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .rfq-card-id {
      font-size: 0.72rem;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    .rfq-card-date {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .rfq-card-price {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .rfq-card-message {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .empty-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 50px 20px;
      color: var(--muted);
      font-size: 0.875rem;
    }

    @media (max-width: 640px) {
      .sidebar { display: none; }
      .topbar, .main { left: 0; margin-left: 0; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar">
  <a class="sb-brand" href="#">
    <div class="sb-brand-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L3 7v10l9 5 9-5V7L12 2zm0 2.18L19 8.5v7L12 19.5 5 15.5v-7l7-4.32z"/></svg>
    </div>
    <span class="sb-brand-name">VendoBridge</span>
  </a>

  <nav class="sb-nav">
    <a class="sb-item" href="#">
      <span class="sb-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </span>
      Dashboard
    </a>

    <a class="sb-item active" href="#">
      <span class="sb-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
        </svg>
      </span>
      Create RFQs
    </a>

    <a class="sb-item" href="#">
      <span class="sb-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </span>
      Compare Quotations
    </a>

    <a class="sb-item" href="#">
      <span class="sb-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>
        </svg>
      </span>
      Generate Purchase Orders
    </a>

    <a class="sb-item" href="#">
      <span class="sb-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
        </svg>
      </span>
      Generate Invoices
    </a>
  </nav>

  <div class="sb-user">
    <div class="sb-user-label">Logged in as</div>
    <div class="sb-user-name" id="sb-fullname">Loading...</div>
  </div>
</aside>

<!-- ── TOPBAR ── -->
<header class="topbar">
  <span class="topbar-title">Create RFQs</span>
</header>

<!-- ── MAIN ── -->
<main class="main">

  <!-- Create RFQ Form -->
  <div class="section-title">New RFQ</div>
  <div class="rfq-form">

    <!-- RFQ ID fetched from API -->
    <div class="rfq-id-row">
      <span class="rfq-id-label">RFQ ID</span>
      <span class="rfq-id-value" id="rfq-id-display">Fetching...</span>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Quoted Price</label>
        <input type="number" class="form-input" id="rfq-price" placeholder="Enter quoted price" min="0"/>
      </div>
      <div class="form-group">
        <!-- spacer for layout -->
      </div>
    </div>

    <div class="form-row">
      <div class="form-group full">
        <label class="form-label">Message</label>
        <textarea class="form-input" id="rfq-message" placeholder="Enter message for this RFQ..."></textarea>
      </div>
    </div>

    <div class="form-footer">
      <span class="error-msg" id="rfq-error"></span>
      <button class="submit-btn" id="rfq-submit" onclick="createRFQ()">Create RFQ</button>
    </div>

  </div>

  <!-- My RFQs -->
  <div class="section-title">My RFQs</div>
  <div class="rfq-grid" id="rfq-grid">
    <div class="empty-msg">Loading your RFQs...</div>
  </div>

</main>

<script>
  // ── ACTIVE NAV ──
  document.querySelectorAll('.sb-item').forEach(item => {
    item.addEventListener('click', function() {
      document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('active'));
      this.classList.add('active');
    });
  });

  // ── FETCH OFFICER USER ──
  async function loadUser() {
    try {
      const res = await fetch('/api/officer/me');
      const data = await res.json();
      document.getElementById('sb-fullname').textContent = data.fullname || data.username || 'Officer';
    } catch (err) {
      document.getElementById('sb-fullname').textContent = 'Officer';
    }
  }

  // ── FETCH RFQ ID ──
  // API: GET /api/officer/rfqid → { rfqId: "abc123" }
  let currentRfqId = null;

  async function loadRfqId() {
    try {
      const res = await fetch('/api/officer/rfqid');
      const data = await res.json();
      currentRfqId = data.rfqId;
      document.getElementById('rfq-id-display').textContent = currentRfqId;
    } catch (err) {
      document.getElementById('rfq-id-display').textContent = 'Failed to load';
      currentRfqId = null;
    }
  }

  // ── CREATE RFQ ──
  // API: POST /api/officer/rfq → body: { rfqId, price, message }
  async function createRFQ() {
    const price = document.getElementById('rfq-price').value.trim();
    const message = document.getElementById('rfq-message').value.trim();
    const errorEl = document.getElementById('rfq-error');
    const submitBtn = document.getElementById('rfq-submit');

    errorEl.textContent = '';

    if (!currentRfqId) { errorEl.textContent = 'RFQ ID not loaded. Please refresh.'; return; }
    if (!price) { errorEl.textContent = 'Please enter a quoted price.'; return; }
    if (!message) { errorEl.textContent = 'Please enter a message.'; return; }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating...';

    try {
      const res = await fetch('/api/officer/rfq', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rfqId: currentRfqId, price: Number(price), message })
      });

      if (!res.ok) throw new Error('Failed to create RFQ');

      // reset form
      document.getElementById('rfq-price').value = '';
      document.getElementById('rfq-message').value = '';

      // fetch new RFQ ID for next use
      await loadRfqId();

      // refresh list
      await loadMyRFQs();

    } catch (err) {
      errorEl.textContent = 'Failed to create RFQ. Please try again.';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Create RFQ';
    }
  }

  // ── LOAD MY RFQs ──
  // API: GET /api/officer/rfq → { rfqs: [ { rfqId, price, message, createdAt, ... } ] }
  async function loadMyRFQs() {
    const grid = document.getElementById('rfq-grid');
    try {
      const res = await fetch('/api/officer/rfq');
      const data = await res.json();
      const rfqs = data.rfqs || [];

      if (rfqs.length === 0) {
        grid.innerHTML = '<div class="empty-msg">No RFQs created yet.</div>';
        return;
      }

      grid.innerHTML = rfqs.map(r => `
        <div class="rfq-card">
          <div class="rfq-card-header">
            <span class="rfq-card-id">${r.rfqId}</span>
            <span class="rfq-card-date">${r.createdAt ? new Date(r.createdAt).toLocaleDateString() : '—'}</span>
          </div>
          <div class="rfq-card-price">₹${Number(r.price).toLocaleString('en-IN')}</div>
          <div class="rfq-card-message">${r.message}</div>
        </div>
      `).join('');

    } catch (err) {
      grid.innerHTML = '<div class="empty-msg">Failed to load RFQs.</div>';
    }
  }

  loadUser();
  loadRfqId();
  loadMyRFQs();
</script>

</body>
</html>
