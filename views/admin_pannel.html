<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VendoBridge — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --panel: #13161d;
      --border: #1f2330;
      --accent: #c8a96e;
      --accent-glow: rgba(200,169,110,0.13);
      --text: #e8e6e0;
      --muted: #6b6f7c;
      --input-bg: #191c25;
      --input-border: #252837;
      --sidebar-w: 240px;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      display: flex;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -180px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(200,169,110,0.06) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 50;
    }

    .sb-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 22px 20px 20px;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
    }
    .sb-brand-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sb-brand-icon svg { width: 15px; height: 15px; fill: #0d0f14; }
    .sb-brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      color: var(--accent);
      letter-spacing: 0.03em;
    }
    .sb-badge {
      margin-left: auto;
      font-size: 0.6rem;
      font-weight: 500;
      background: rgba(200,169,110,0.18);
      color: var(--accent);
      border: 1px solid rgba(200,169,110,0.3);
      border-radius: 4px;
      padding: 2px 6px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .sb-nav {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0 12px;
    }
    .sb-nav::-webkit-scrollbar { width: 0; }

    .sb-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 20px;
      cursor: pointer;
      text-decoration: none;
      color: var(--muted);
      font-size: 0.875rem;
      font-weight: 400;
      transition: color 0.18s, background 0.18s;
      border-left: 2px solid transparent;
      margin: 1px 0;
    }
    .sb-item:hover {
      color: var(--text);
      background: rgba(255,255,255,0.03);
    }
    .sb-item.active {
      color: var(--accent);
      background: var(--accent-glow);
      border-left-color: var(--accent);
      font-weight: 500;
    }
    .sb-icon {
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sb-icon svg { width: 17px; height: 17px; }

    /* user at bottom */
    .sb-user {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
    }
    .sb-user-label {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }
    .sb-user-name {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sb-user-role {
      font-size: 0.7rem;
      color: var(--accent);
      margin-top: 2px;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: fixed;
      top: 0;
      left: var(--sidebar-w);
      right: 0;
      height: 60px;
      background: rgba(13,15,20,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 28px;
      z-index: 40;
    }
    .topbar-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
    }

    /* ── MAIN ── */
    .main {
      margin-left: var(--sidebar-w);
      margin-top: 60px;
      flex: 1;
      overflow-y: auto;
      min-height: calc(100vh - 60px);
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .empty-state p {
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 300;
    }

    @media (max-width: 640px) {
      .sidebar { display: none; }
      .topbar, .main { left: 0; margin-left: 0; }
    }
  </style>
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar">

  <a class="sb-brand" href="#">
    <div class="sb-brand-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L3 7v10l9 5 9-5V7L12 2zm0 2.18L19 8.5v7L12 19.5 5 15.5v-7l7-4.32z"/></svg>
    </div>
    <span class="sb-brand-name">VendoBridge</span>
    <span class="sb-badge">Admin</span>
  </a>

  <nav class="sb-nav">

    <a class="sb-item active" href="/admin/officers">
      <span class="sb-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>
        </svg>
      </span>
      Manage Officers
    </a>

    <a class="sb-item" href="/admin/vendors">
      <span class="sb-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </span>
      Manage Vendors
    </a>

    <a class="sb-item" href="/admin/managers">
      <span class="sb-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0112 0v2"/>
          <path d="M19 8l2 2-6 6h-2v-2l6-6z"/>
        </svg>
      </span>
      Manage Managers
    </a>

    <a class="sb-item" href="/admin/analytics">
      <span class="sb-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
      </span>
      Procurement Analytics
    </a>

  </nav>

  <!-- user at bottom -->
  <div class="sb-user">
    <div class="sb-user-label">Logged in as</div>
    <div class="sb-user-name" id="sb-fullname">Loading...</div>
    <div class="sb-user-role">System Administrator</div>
  </div>

</aside>

<!-- ── TOPBAR ── -->
<header class="topbar">
  <span class="topbar-title">Admin Dashboard</span>
</header>

<!-- ── MAIN ── -->
<main class="main">
  <div class="empty-state">
    <p>Your page content goes here.</p>
  </div>
</main>

<script>
  // ── ACTIVE NAV ──
  document.querySelectorAll('.sb-item').forEach(item => {
    item.addEventListener('click', function() {
      document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('active'));
      this.classList.add('active');
    });
  });

  // ── FETCH ADMIN USER ──
  async function loadUser() {
    try {
      const res = await fetch('/api/admin/me');
      const data = await res.json();
      document.getElementById('sb-fullname').textContent = data.fullname || data.username || 'Admin';
    } catch (err) {
      document.getElementById('sb-fullname').textContent = 'Admin';
    }
  }

  loadUser();
</script>

</body>
</html>
